image:
  repository: meteo/producer
  tag: ""
  pullPolicy: ""

serviceAccount:
  create: true
  name: ""
  annotations: {}

schedule: "*/30 * * * *"
restartPolicy: OnFailure
successfulJobsHistoryLimit: 3
failedJobsHistoryLimit: 3

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    memory: 128Mi

env:
  APP_ENV: production
  WEATHER_PROVIDER: openweather
  QUEUE_PROVIDER: sqs
  QUEUE_NAME: weather

secrets:
  # -- Name of an existing Secret containing OPENWEATHER_API_KEY.
  openweatherApiKeySecret: ""
  openweatherApiKeyKey: OPENWEATHER_API_KEY

service:
  port: 80

gateway:
  httpRoute:
    enabled: false
    hostnames: []
    filters: []

podAnnotations: {}
nodeSelector: {}
tolerations: []
