apiVersion: v2
name: meteo
description: Real-time weather data pipeline
type: application
version: 0.1.0
appVersion: "1.0.0"

dependencies:
  - name: producer
    version: 0.1.0
    condition: producer.enabled
  - name: consumer
    version: 0.1.0
    condition: consumer.enabled
  - name: api
    version: 0.1.0
    condition: api.enabled
  - name: gateway-helm
    version: "v1.7.1"
    repository: "oci://docker.io/envoyproxy"
    namespace: envoy-gateway-system
    condition: envoy.enabled
  - name: cert-manager
    version: v1.20.0
    repository: oci://quay.io/jetstack/charts
    alias: cert-manager
    condition: cert-manager.enabled
